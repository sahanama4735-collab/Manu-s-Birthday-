
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bangaraa ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
-45deg,
#ffd6e7,
#ffe4f2,
#fff0f7,
#e0c3fc,
#fbc2eb
);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Title */
.title{
position:absolute;
top:20px;
width:100%;

text-align:center;

font-size:55px;
font-weight:900;

color:BLACK;

text-shadow:
0 0 10px #fff,
0 0 30px hotpink,
0 0 60px deeppink;

animation:titleGlow 2s infinite alternate;
}

@keyframes titleGlow{
from{
transform:scale(1);
}
to{
transform:scale(1.05);
}
}

/* Wall */
.wall::before{
    content:"";

    position:absolute;
    inset:0;

    border-radius:35px;

    padding:2px;

    background:linear-gradient(
        45deg,
        #ff69b4,
        #ffd6e7,
        #ffb6c1,
        #ff69b4
    );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;
            mask-composite:exclude;

    pointer-events:none;
}

/* Photos */
.polaroid{
    position:absolute;
    overflow:visible;
}

/* Corner Ribbon */
.polaroid::before{
    content:"🎀";
    position:absolute;
    top:-12px;
    right:-12px;

    width:45px;
    height:45px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:35px;

    z-index:100;

    animation:ribbonFloat 2s ease-in-out infinite;
}

@keyframes ribbonFloat{
    0%,100%{
        transform:rotate(10deg);
    }
    50%{
        transform:rotate(-10deg) scale(1.1);
    }
}
.polaroid{
position:absolute;

background:rgba(255,255,255,.25);
backdrop-filter:blur(15px);

padding:12px;
border-radius:25px;

border:1px solid rgba(255,255,255,.4);

box-shadow:
0 10px 30px rgba(255,105,180,.25);

animation:
floatPhoto 5s ease-in-out infinite,
glowPhoto 2s infinite alternate;

transition:.5s;
}

.polaroid:hover{
transform:scale(1.1);
z-index:999;
}

.polaroid img{
width:200px;
height:250px;
object-fit:cover;
border-radius:18px;
}

.p1{
top:10%;
left:8%;
}

.p2{
top:15%;
right:10%;
}

.p3{
bottom:12%;
left:12%;
}

.p4{
bottom:10%;
right:12%;
}

.p5{
top:35%;
left:40%;
}

@keyframes floatPhoto{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-20px);
}
}

@keyframes glowPhoto{
from{
box-shadow:
0 0 20px rgba(255,105,180,.3);
}
to{
box-shadow:
0 0 40px hotpink,
0 0 80px pink;
}
}
.polaroid h3{
    margin-top:10px;
    text-align:center;

    font-size:22px;
    font-weight:700;

    color:BLACKs;

    text-shadow:
    0 0 10px white,
    0 0 20px pink;
}

/* Sparkles */
.sparkle{
position:absolute;
font-size:30px;
color:white;
animation:twinkle 2s infinite alternate;
}

.s1{top:10%;left:15%;}
.s2{top:18%;right:18%;}
.s3{bottom:20%;left:10%;}
.s4{bottom:15%;right:12%;}

@keyframes twinkle{
from{
opacity:.4;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1.3);
}
}

/* Hearts */
.heart{
position:absolute;
animation:rise 8s linear forwards;
pointer-events:none;
}

@keyframes rise{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="title">
Happy Birthday Bangaraa ❤️
</div>



<div class="wall">
<div class="wall">

    <div class="polaroid p1">
        <img src="one.jpg">
        <h3>FirstYear❤️</h3>
    </div>

    <div class="polaroid p2">
        <img src="two.jpg">
        <h3>Second year❤️</h3>
    </div>

    <div class="polaroid p3">
        <img src="three.jpg">
        <h3>Third year❤️</h3>
    </div>

    <div class="polaroid p4">
        <img src="four.jpg">
        <h3>Fourth year❤️</h3>
    </div>

    <div class="polaroid p5">
        <img src="manu.jpg">
        <h3>Fifth year❤️</h3>
    </div>

</div>

</div>

<script>



</body>
</html>

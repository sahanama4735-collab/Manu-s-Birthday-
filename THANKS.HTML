<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Thank You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:linear-gradient(135deg,#ffdce8,#f8e8ff,#dff5ff);
}

/* Background Glow */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
}

body::before{
    width:350px;
    height:350px;
    background:#ff9fc8;
    top:-120px;
    left:-120px;
    opacity:.5;
}

body::after{
    width:420px;
    height:420px;
    background:#b18cff;
    bottom:-150px;
    right:-120px;
    opacity:.4;
}


/* Card */

.card{

    width:430px;
    padding:45px;
    border-radius:35px;

    background:rgba(255,255,255,.35);

    backdrop-filter:blur(25px);

    border:2px solid rgba(255,255,255,.6);

    box-shadow:
    0 25px 50px rgba(255,105,180,.25),
    inset 0 2px 10px rgba(255,255,255,.4);

    text-align:center;

    position:relative;

    z-index:2;

    animation:float 5s ease-in-out infinite;

}

/* Outer Glow */

.card::before{

content:"";

position:absolute;

inset:-10px;

border-radius:40px;

border:2px solid rgba(255,255,255,.7);

box-shadow:
0 0 25px #ff8fc5,
0 0 60px rgba(255,150,220,.4);

animation:ring 4s infinite;

}

@keyframes ring{

50%{
transform:scale(1.03);
}

}

@keyframes float{

50%{
transform:translateY(-12px);
}

}

/* Heart */

.heart{

font-size:75px;

animation:beat 1s infinite;

filter:drop-shadow(0 0 15px hotpink);

}

@keyframes beat{

50%{
transform:scale(1.2);
}

}

/* Heading */

h1{

margin-top:15px;

font-family:'Pacifico',cursive;

font-size:55px;

color:#ff4b91;

text-shadow:
0 0 15px white,
0 0 25px #ff8fc5;

}

/* Message */

p{
    margin-top:20px;
    padding:0 10px;

    font-family:'Poppins',sans-serif;
    font-size:18px;
    font-weight:800;
    line-height:1.7;

    color:#000;

    text-shadow:
        1px 1px 0 #fff,
        2px 2px 3px rgba(0,0,0,0.25);

    letter-spacing:0.5px;
}

/* Button */

button{

margin-top:30px;

padding:15px 45px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:17px;

font-weight:600;

background:linear-gradient(135deg,#ff5fa2,#ff9b73);

color:white;

box-shadow:
0 12px 25px rgba(255,105,180,.35);

transition:.35s;

}

button:hover{

transform:translateY(-5px) scale(1.05);

box-shadow:
0 18px 35px rgba(255,105,180,.5);

}

/* Floating Hearts */

.float{

position:absolute;

pointer-events:none;

animation:fly linear infinite;

z-index:1;

}

@keyframes fly{

0%{
transform:translateY(100vh) scale(.5) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.3) rotate(360deg);
opacity:0;
}

}

</style>

</head>

<body>

<div class="card">

<div class="heart">💗</div>

<h1>Thank You</h1>

<p>
Every moment with you is a beautiful memory Thank you for making my life brighter every day BANGARAA.
<BR>LOVE YOU CHOO MUCH 
<BR>━━━━ ✦ ━━━━
</p>


</div>


</body>
</html>
